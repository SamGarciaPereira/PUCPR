{% extends "base1.html" %}
{% block content %}
<h1>Usuários</h1>
<ul>
    {% for user, password in devices.items() %}
    <li>
        {{ user }} - {{ password }}
        <a href="/remove_user?user={{ user }}">
            <button>Remover</button>
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
