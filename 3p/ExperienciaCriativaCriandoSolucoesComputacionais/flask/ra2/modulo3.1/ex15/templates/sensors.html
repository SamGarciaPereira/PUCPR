{% extends"base.html" %}
{% block content%}
<div class="vertical-center">
    <div class="container view">
        <div class="justify-content-center">
            {% if devices|length> 0 %}
            <table id="view_sensors" class="table table-striped table-bordered"
                style="width:100%">
                <p>Sensores:</p>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Deletar</th>
                    </tr>
                </thead>
                <tbody>
                    {% for key, value in devices.items() %}
                    <tr>
                        <td>{{ key }}</td>
                        <td>{{ value }}</td>
                        <td><a
                                href="{{ url_for('remove_sensor') }}?sensor={{ key }}">Deletar</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <form action="{{ url_for('register_sensor') }}">
                <p><input type="submit" value="Adicionar Sensor" /></p>
            </form>
            {% else %}
            <p>Ainda não sensores registrados!<p>
                    <form action="{{ url_for('register_sensor') }}">
                        <p><input type="submit" value="Adicionar Sensor" /></p>
                    </form>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endblock%}
