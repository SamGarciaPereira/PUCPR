<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex. 9</title>
</head>
<body>
    <h1>Ex. 9</h1>

    <h2>Atuadores</h2>
    <ul>    
        {% for atuador, estado in atuadores.items() %}
            <li>{{ atuador }}: {{ estado }}</li>
            {% if estado == 1 %}
                <p>Ligado</p>
            {% else %}
                <p>Desligado</p>
            {% endif %}
        {% endfor %}
</body>
</html>
