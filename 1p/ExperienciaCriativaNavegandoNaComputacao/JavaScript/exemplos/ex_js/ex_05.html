<!DOCTYPE html>
<html>
    <body>

        <h2>JavaScript if .. else</h2>
        <p>Uma saudação dependente da hora</p>
        <p id="demo1"></p>
        <h2> Um exemplo de laço de repetição - for</h2>
        <p id="demo2"></p>

    <script>
        <!-- um exemplo de if-else -->
        const hour = new Date().getHours(); 
        let greeting;
        if (hour < 18) {
            greeting = "Bom dia!";
        } else {
            greeting = "Boa noite";
        }
        document.getElementById("demo1").innerHTML = greeting;
    </script>

    <script>
        <!-- um exemplo do loop for -->
        let text = "";
        for (let i = 0; i < 5; i++) {
        text += "O número é " + i + "<br>";
        }
        document.getElementById("demo2").innerHTML = text;
    </script>

    </body>
</html>
