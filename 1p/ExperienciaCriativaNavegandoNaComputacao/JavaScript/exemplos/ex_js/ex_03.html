<!DOCTYPE html>
<html>
    <body>

        <h2>O quê JavaScript pode fazer? (3)<h2>

        <p id="demo1">JavaScript pode alterar o estilo de um elemento HTML.</p>
        <button type="button" onclick="document.getElementById('demo1').style.fontSize='35px'">35px</button>
        <button type="button" onclick="document.getElementById('demo1').style.fontSize='50px'">50px</button> <br>

        <p id="demo2">JavaScript pode esconder e mostrar elementos HTML.</p>
        <button type="button" onclick="document.getElementById('demo2').style.display='none'">Esconder</button> 
        <button type="button" onclick="document.getElementById('demo2').style.display='block'">Mostrar</button>

    </body>
</html>
