<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>

    <h2>Formulário de entrada de dados</h2>
    <p> Um form HTML é usado para coletar dados de entrada do usuário. <br>
        Os inputs do usuário são normalmente enviados para o servidor para serem processados.<br>
        neste exemplo, através do código em "action_page.php" (que não está implementada neste exemplo).
    </p>

    <form action="/action_page.php">
        <label for="fname">Nome:</label><br>
        <input type="text" id="fname" name="fname"><br>

        <label for="lname">Sobrenome:</label><br>
        <input type="text" id="lname" name="lname"><br>
        
        <label for="email">e-mail:</label> <br>
        <input type="email" id="email" name="email"> <br> 
        
        <label for="birthday">Data Nascimento:</label> <br>
        <input type="date" id="birthday" name="birthday"> <br> 
        
        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha"><br>

        <label for="quantity">Idade:</label><br>
        <input type="number" id="idade" name="idade" min="15">
        <br><br>

        <input type="submit" value="Submit">
    </form>

    </body>
</html>
