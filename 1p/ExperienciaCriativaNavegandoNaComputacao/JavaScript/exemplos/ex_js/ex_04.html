<!DOCTYPE html>
<html>
<head>
    <script>
        function myFunction1() {
        document.getElementById("demo").innerHTML = "Parágrafo alterado!";
        }
        function myFunction2() {
        document.getElementById("demo").innerHTML = "Parágrafo original";
        }
    </script>
</head>
    <body>
        <h2>Uma função JavaScript no Head</h2>
        <p id="demo">Parágrafo Original</p>
        <button type="button" onclick="myFunction1()">Alterar o parágrafo</button>
        <button type="button" onclick="myFunction2()">Voltar ao original</button>
    </body>
</html>
