<!DOCTYPE html>
<html>
    <body>

        <h2>O quê JavaScript pode fazer? (2)</h2>

        <p>JavaScript pode alterar valores de atributos HTML</p>

        <p>Neste caso, JavaScript altera o valor do atributo src (source) de uma image.</p>

        <button onclick="document.getElementById('myImage').src='pic_bulbon.gif'">Acender a Luz</button>

        <img id="myImage" src="pic_bulboff.gif" style="width:100px"> <!-- imagem inicial -->

        <button onclick="document.getElementById('myImage').src='pic_bulboff.gif'">Apagar a Luz</button>

    </body>
</html>
