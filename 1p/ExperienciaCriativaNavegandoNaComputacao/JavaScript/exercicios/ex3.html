<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex. 3</title>
</head>
<body>
    <center>
        <main>
            <div>
                <form>
                    <button type="button" id="Btn_hello">Click me!</button>
                    <h3> </h3>
                </form>
            </div>
            <div>
                <form>
                    1o número: <input type="number" id="n1">
                    <h3> </h3>
                    2o número: <input type="number" id="n2">
                    <h3> </h3>
                    <button type="button" id="Btn_soma">Somar</button>
                    
                </form>
            </div>
        </main>
    </center>
    <script>
        document.getElementById('Btn_hello').addEventListener('click', function(event){
            alert("Hello World!");
        });

        document.getElementById('Btn_soma').addEventListener('click', function(event){
            const n1 = document.getElementById('n1').value;
            const n2 = document.getElementById('n2').value;
            

            if(isNaN(n1) && isNaN(n2)){
                alert("Campos estão vazios.")
            }else{
                let soma = n1 + n2;
                alert('a soma de ${n1} + ${n2} = ${soma}');
            }

        });
        
            

    
    </script>
</body>
</html>
