<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/imagens/icone.png">
    <link rel="stylesheet" href="styles-plataforma.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700&display=swap" rel="stylesheet">
    <title>CienciaLab | Menu</title>
</head>
<body>
    <div class="fundo-animado"></div>
    <div class="header">
        <button type="button" class="btn-sair" id="sair">🡰 Sair</button>
        <img src="assets/imagens/logo-sf.png"  alt="Logo CienciaLab" class="logo">
    </div>

    <div class="area-btn">
        <h2 class="frase">Bem vindo ao Ciência Lab! </h2>

        <div class="area-biomas">
            <button type="button" class="btn-biomas" id="biomas">🌳 Aprender sobre Biomas do Brasil</button>
        </div>

        <div class="area-ciclo">
            <button type="button" class="btn-ciclo" id="ciclo">💧 Aprender sobre Ciclo da Água</button>
        </div>

        <div class="area-desastres">
            <button type="button" class="btn-desastres" id="desastres">🌪️ Aprender sobre Desastres Naturais</button>
        </div>

        <div class="area-exercicios">
            <button type="button" class="btn-exercicios" id="exercicios">📄 Realizar Exercícios</button>
        </div>
    </div>
    
    <script src="script-inicio-plataforma.js"> </script>

</body>
</html>
