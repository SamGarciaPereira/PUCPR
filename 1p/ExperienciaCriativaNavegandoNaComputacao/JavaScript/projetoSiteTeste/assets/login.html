<html>
    <head>
        <title> CienciaLab | Entrar </title>
        <link rel="stylesheet" href="output.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700&display=swap" rel="stylesheet">
    </head>

    <body class="m-0 p-0 h-[100%] flex font-sans">
        <!--LOGIN-->
        <div class="w-[40%] bg-white p-5 flex flex-col justify-center items-center" >
            <!--FUNDO-->
            <div class="bg-green-700 absolute top-[0%] pl-[130px] pr-[130px] pt-10 pb-20 rounded-b-[30px]">
                <img src="https://i.ibb.co/0CYK2Cm/1730144608830.png" height="60" class="img-fundo">
            </div>
            <!--FORM LOGIN-->
            <div class="w-full max-w-96 absolute top-[22%] bg-white p-7 rounded-b-[25px] rounded-t-[25px] shadow-md text-base font-bold">
                <center>
                    <!--TITULO LOGIN-->
                    <p><span class="text-base font-bold">Entre com seus dados para acessar a plataforma.</span></p>
                </center>
                <form>
                    <!--LABEL LOGIN-->
                    <p class="font-bold m-2 text-black text-base">Login</p>
                    <input type="text">
                    <br>
                    <!--LABEL SENHA-->
                    <p class="font-bold m-0 mt-5 mb-2 text-black font-base">Senha</p>
                    <input type="password">
                    <br>
                    <!--BTN ENTRAR-->
                    <button type="button" class="m-6 mb-0 p-3 border-0 rounded-[25px] bg-green-700 text-white cursor-pointer w-[100%] max-w-[400px] font-sans font-bold text-lg transition-colors duration-200 ease-in-out hover:scale-105">Acessar plataforma</button>
                </form>
                <!--BOTÓES AJUDA-->
                <div class="flex gap-4 mt-1 justify-center">
                    <button type="button" class="btn-esqSenha">Esqueci a senha</button>
                    <button type="button" class="btn-ajuda">Ajuda</button>
                </div>

            </div>
        </div>  
        <!--METADE IMAGEM-->      
        <div class="w-[60%] bg-cover bg-[url('https://i.ibb.co/RhBGzmD/little-boy-participating-online-class.jpg')] bg-right-top"></div>
        
        <div id="modal-recuperacao" class="modal-recuperacao" style="display: none;">
            <div class="modal-overlay"></div>
            <div class="container">
                <div class="logo"></div>
                <h1>Recuperação da conta</h1>
                <p>Para recuperar sua conta, insira seu e-mail ou nome de usuário e enviaremos um código para você.</p>
                <input type="text" class="input-field" placeholder="Insira seu e-mail ou nome de usuário">
                <button class="btn-envCodigo">Enviar código</button>
                <button class="btn-voltarSenha" id="btn-voltarSenha">🡰 Voltar</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
