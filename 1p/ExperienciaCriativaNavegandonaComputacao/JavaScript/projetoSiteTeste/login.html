<html>
    <head>
        <title> CiênciaLab | Entrar </title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="styles2.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5806/5806342.png">
    </head>

    <body>
        <div class="login" id="login">

            <div class="fundo">
                <img src="https://i.ibb.co/0CYK2Cm/1730144608830.png" height="60" class="img-fundo">
            </div>

            <div class="form-login">
                <center>
                    <p><span class="titulologin">Entre com seus dados para acessar a plataforma.</span></p>
                </center>
                <form>
                    <p class="label-login">Login</p>
                    <input type="text">
                    <br>
                    <p class="label-senha">Senha</p>
                    <input type="password">
                    <br><button type="button" class="btn-entrar">Acessar plataforma</button>
                </form>

                <div class="botoes-ajuda">
                    <button type="button" class="btn-esqSenha" id="btn-esqSenha">Esqueci a senha</button>
                    <button type="button" class="btn-ajuda">Ajuda</button>
                </div>

            </div>
        </div>
                
        <div class="metade-imagem"></div>

        <div id="modal-recuperacao" class="modal-recuperacao" style="display: none;">
            <div class="modal-overlay"></div>
            <div class="container">
                <div class="logo"></div>
                <h1>Recuperação da conta</h1>
                <p>Para recuperar sua conta, insira seu e-mail ou nome de usuário e enviaremos um código para você.</p>
                <input type="text" class="input-field" placeholder="Insira seu e-mail ou nome de usuário">
                <button class="btn-envCodigo">Enviar código</button>
                <button class="btn-voltarSenha" id="btn-voltarSenha">🡰 Voltar</button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
