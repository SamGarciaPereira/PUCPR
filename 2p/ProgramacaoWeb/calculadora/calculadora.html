<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>
  <style>
    .calc1 {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 500px;
      margin: auto;
      margin-bottom: 100px;
      font-family: sans-serif;
    }

    .linha {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="number"] {
      width: 30px;
      padding: 10px;
    }

    input.resultado {
      border: 1px solid #ccc;
      background-color: #f4f4f4;
      text-align: center;
      height: 37px ;
    }

    .btn-operacao{
      padding: 10px;
      font-size: 14px;
      color: white;
      background-color: #ff8000;
      border: 1px solid #ff8000;
      height: 37px;
      width: 37px;
    }

    .btn-operacao:hover{
      background-color: #EE5000;
    }

    .calc2-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    .calc2 {
      background: #ccc;
      padding: 15px;
      border-radius: 10px;
    }

    .calc2-visor {
      width: 100%;
      height: 40px;
      font-size: 20px;
      text-align: right;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 10px;
      border: none;
      max-width: 12ch;
    }

    .calc2-botoes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

  
    .calc2-botoes button {
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .calc2-botoes button {
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .calc2-botoes button:hover {
      background-color: #928b8b;
    }
    
  </style>
  <script defer>
    function trataClick(btn) {
      const linha = btn.closest(".linha");
      const inputs = linha.querySelectorAll("input[type='number']");
      const resultadoInput = linha.querySelector("input.resultado");

      const val1 = parseFloat(inputs[0].value);
      const val2 = parseFloat(inputs[1].value);
      let resultado;

      if (isNaN(val1) || isNaN(val2)) {
        resultadoInput.value = "Valores inválidos";
        return;
      }

      switch (btn.dataset.op) {
        case "soma":
          resultado = val1 + val2;
          break;
        case "sub":
          resultado = val1 - val2;
          break;
        case "mult":
          resultado = val1 * val2;
          break;
        case "div":
          resultado = val2 !== 0 ? val1 / val2 : "Erro";
          break;
      }

      resultadoInput.value = resultado;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const btns = document.querySelectorAll(".btn-operacao");
      btns.forEach(btn => {
        btn.addEventListener("click", function () {
          trataClick(this);
        });
      });
    });

    function calc2Add(v) {
      const visor = document.getElementById('calc2-visor');
      if (visor.value.length < 12) visor.value += v;
    }

    function calc2Limpar() {
      document.getElementById('calc2-visor').value = '';
    }

    function calc2Calcular() {
      const visor = document.getElementById('calc2-visor');
      try {
        visor.value = eval(visor.value).toString().slice(0, 12);
      } catch {
        visor.value = 'Erro';
      }
    }
  </script>
</head>
<body>
  <div class="calc1">
    <div class="linha">
      <input type="number" placeholder="n1">
      <input type="number" placeholder="n2">
      <button class="btn-operacao" data-op="soma">+</button> = 
      <input type="text" class="resultado" placeholder="Resultado" readonly>
    </div>

    <div class="linha">
      <input type="number" placeholder="n1">
      <input type="number" placeholder="n2">
      <button class="btn-operacao" data-op="sub">-</button> = 
      <input type="text" class="resultado" placeholder="Resultado" readonly>
    </div>

    <div class="linha">
      <input type="number" placeholder="n1">
      <input type="number" placeholder="n2">
      <button class="btn-operacao" data-op="mult">x</button> = 
      <input type="text" class="resultado" placeholder="Resultado" readonly>
    </div>

    <div class="linha">
      <input type="number" placeholder="n1">
      <input type="number" placeholder="n2">
      <button class="btn-operacao" data-op="div">/</button> = 
      <input type="text" class="resultado" placeholder="Resultado" readonly>
    </div>
  </div>

  <div class="calc2-container">
    <div class="calc2">
      <input type="text" id="calc2-visor" class="calc2-visor" disabled maxlength="12">
      <div class="calc2-botoes">
        <button onclick="calc2Add('7')">7</button>
        <button onclick="calc2Add('8')">8</button>
        <button onclick="calc2Add('9')">9</button>
        <button onclick="calc2Add('/')">/</button>

        <button onclick="calc2Add('4')">4</button>
        <button onclick="calc2Add('5')">5</button>
        <button onclick="calc2Add('6')">6</button>
        <button onclick="calc2Add('*')">*</button>

        <button onclick="calc2Add('1')">1</button>
        <button onclick="calc2Add('2')">2</button>
        <button onclick="calc2Add('3')">3</button>
        <button onclick="calc2Add('-')">-</button>

        <button onclick="calc2Add('0')">0</button>
        <button onclick="calc2Limpar()">CA</button>
        <button onclick="calc2Calcular()">=</button>
        <button onclick="calc2Add('+')">+</button>
      </div>
    </div>
  </div>
</body>
</html>
