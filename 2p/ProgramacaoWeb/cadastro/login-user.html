<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Login | Programação Web</title>
    <style>
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .box{
            background-color: #c7ebf1;
            padding: 10px 20px 10px 20px;
        }

        .titulo{
            font-weight: bold;
            font-size: 24px;
        }

        .estilo-box input{
            margin-bottom: 10px;
            width: 90%;
            height: 25px;
        }

        .btn{
            height: 25px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="box estilo-box">
                <p class="titulo">Welcome to my site</p>
                <i class="fa-solid fa-user"></i> <input type="text" placeholder="Username">
                <br>
                <i class="fa-solid fa-key"></i> <input type="password" placeholder="Password">
                <br>
                <button class="btn"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                <p class="ajuda">No account yet? <a href="./cadastro-user.html"><i class="fa-solid fa-square-plus"></i> Create one!</a></p>
            </div>
        </div>
    </div>
</body>
</html>
