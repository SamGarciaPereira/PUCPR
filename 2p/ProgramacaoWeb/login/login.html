<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        .field{
            width: 280px;
            border-radius: 3px;
            border-width: 1px;
            border-color: #ccc;
            border-style: solid;
            display: flex;
            flex-direction: column;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
            margin-top: 5px;
            font-family: Arial, sans-serif;
        }

        .btn_salvar{

            height: 40px;
            border-radius: 3px;
            margin-top: 20px;
            font-weight: bold;
            color: white;

        }

        .btn_salvar:hover{
            background-color: #04b486;
        }

</head>

</html>
