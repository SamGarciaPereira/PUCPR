<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function comparar(){
            let v1 = document.getElementById("i1").value;
            let v2 = document.getElementById("i2").value;
            
            if(v1 > v2){
                alert("O valor 1 é maior!");
            }else if(v1 < v2){
                alert("O valor 2 é maior!");
            }else{
                alert("Os valores são iguais!");
            }
        }
    </script> 
</head>
<body>
    <input type="number" id="i1">
    <input type="number" id="i2">
    <button onclick="comparar()" class="btn">Comparar</button>
</body>
</html>
